<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>同高貼齊</title>
</head>
<body>
  <!-- App 的 SDK 進入點（白板背景 headless 載入）。
       這個檔案是「薄載入器」：只負責把 headless.js 用時間戳載進來——
       GitHub Pages 快取只吃得住這個殼，邏輯（headless.js / align-core.js）
       每次開白板都抓最新版。以後改行為不用再去 Miro 後台 bump App URL 的 ?v。 -->
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <script>
    var s = document.createElement('script');
    s.src = 'headless.js?cb=' + Date.now();
    document.body.appendChild(s);
  </script>
</body>
</html>
